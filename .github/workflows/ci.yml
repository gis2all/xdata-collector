name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install test tooling
        run: python -m pip install --upgrade pip pytest pytest-cov ruff pre-commit

      - name: Compile key Python entrypoints
        run: python -m py_compile install.py services.py run/api.py run/bootstrap.py run/scheduler.py run/static_web_server.py .github/scripts/generate_coverage_badge.py backend/*.py backend/collector_service_parts/*.py

      - name: Run Python lint
        run: python -m ruff check backend run tests services.py install.py --select F --extend-select B904 --ignore F401,F403,F405

      - name: Validate pre-commit config
        run: python -m pre_commit validate-config

      - name: Run backend tests
        run: python -m pytest -c tests/pytest.ini tests --cov=backend --cov=run --cov=services --cov-report=term-missing --cov-report=json:runtime/tmp/coverage/coverage.json --cov-fail-under=75

      - name: Build backend coverage badge endpoint
        run: python .github/scripts/generate_coverage_badge.py runtime/tmp/coverage/coverage.json artifacts/badges/backend-coverage.json

      - name: Upload coverage badge artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v4
        with:
          path: artifacts/badges

  web-ui:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web-ui/package-lock.json

      - name: Install web dependencies
        working-directory: web-ui
        run: npm ci

      - name: Run web typecheck
        working-directory: web-ui
        run: npm exec tsc -- -p tsconfig.app.json --noEmit

      - name: Run web tests
        working-directory: web-ui
        run: npm test

      - name: Build web app
        working-directory: web-ui
        run: npm run build

  publish-coverage-badge:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - backend
      - web-ui
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Deploy coverage badge to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
