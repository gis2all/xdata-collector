name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install test tooling
        run: python -m pip install --upgrade pip pytest

      - name: Compile key Python entrypoints
        run: python -m py_compile install.py services.py run/bootstrap.py backend/twitter_cli.py backend/collector_service.py backend/workspace_store.py

      - name: Run backend tests
        run: python -m pytest -c tests/pytest.ini tests

  web-ui:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web-ui/package-lock.json

      - name: Install web dependencies
        working-directory: web-ui
        run: npm ci

      - name: Run web tests
        working-directory: web-ui
        run: npm test

      - name: Build web app
        working-directory: web-ui
        run: npm run build
