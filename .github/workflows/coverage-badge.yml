name: Coverage Badge

permissions:
  contents: read
  pages: write
  id-token: write

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish-coverage-badge:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install test tooling
        run: python -m pip install --upgrade pip pytest pytest-cov

      - name: Run backend tests with coverage JSON
        run: python -m pytest -c tests/pytest.ini tests --cov=backend --cov=run --cov=services --cov-report=term-missing --cov-report=json:runtime/tmp/coverage/coverage.json --cov-fail-under=75

      - name: Build backend coverage badge endpoint
        run: python .github/scripts/generate_coverage_badge.py runtime/tmp/coverage/coverage.json artifacts/badges/backend-coverage.json

      - name: Upload coverage badge artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: artifacts/badges

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Deploy coverage badge to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
